# CoCBot — Docker Compose (physical phone mode)
#
# The bot connects to a real Android phone over ADB on the local network.
# Set ADB_HOST=<phone-ip> and ADB_PORT=5555 in .env.
#
# Quick start:
#   docker compose up -d --build
#   docker compose logs -f

services:
  bot:
    build: .
    env_file:
      - .env
    volumes:
      - ./tools/bot_config.json:/app/tools/bot_config.json
      - ./tools/member_activity.json:/app/tools/member_activity.json
      - /root/.android:/root/.android   # persist ADB keys so phone stays authorized
    network_mode: host   # reach the phone over LAN without port mapping
    restart: unless-stopped
